# Unified Practice App Configuration
# Supports multiple exam types (CFA, PMP)

vault_path: "."

server:
  host: "localhost"
  port: 8010
  frontend_port: 5173

practice:
  default_questions: 20
  default_time_per_question: 90
  show_explanation_immediately: false

scoring:
  weak_threshold: 60
  strong_threshold: 80
  min_questions_for_assessment: 10

paths:
  questions: "Questions"
  sessions: "Sessions"

exams:
  cfa:
    name: "CFA Level 1"
    questions_path: "Questions/CFA"
    sessions_path: "Sessions/CFA"
    category_label: "Topic"
    subcategory_label: "Subtopic"
    category_field: "topic"
    subcategory_field: "subtopic"
    question_types:
      - conceptual
      - calculation
      - application
    session_types:
      - topic_drill
      - subtopic_drill
      - mixed
      - weak_areas
      - mock_exam
      - diagnostic
    categories:
      - name: "Ethics"
        prefix: "ETH"
        weight: 17.5
        target_questions: 525
      - name: "Quantitative Methods"
        prefix: "QM"
        weight: 7.5
        target_questions: 225
      - name: "Economics"
        prefix: "ECO"
        weight: 7.5
        target_questions: 225
      - name: "Financial Statement Analysis"
        prefix: "FSA"
        weight: 12.5
        target_questions: 375
      - name: "Corporate Issuers"
        prefix: "CI"
        weight: 7.5
        target_questions: 225
      - name: "Equity Investments"
        prefix: "EQ"
        weight: 12.5
        target_questions: 375
      - name: "Fixed Income"
        prefix: "FI"
        weight: 12.5
        target_questions: 375
      - name: "Derivatives"
        prefix: "DER"
        weight: 6.5
        target_questions: 195
      - name: "Alternative Investments"
        prefix: "ALT"
        weight: 8.5
        target_questions: 255
      - name: "Portfolio Management"
        prefix: "PM"
        weight: 10.0
        target_questions: 300

  pmp:
    name: "PMP"
    questions_path: "Questions/PMP"
    sessions_path: "Sessions/PMP"
    category_label: "Domain"
    subcategory_label: "Task"
    category_field: "domain"
    subcategory_field: "task"
    question_types:
      - conceptual
      - situational
      - technical
      - calculation
    session_types:
      - category_drill
      - mixed
      - weak_areas
      - mock_exam
    categories:
      - name: "People"
        prefix: "PPL"
        weight: 42.0
        target_questions: 630
      - name: "Process"
        prefix: "PRC"
        weight: 50.0
        target_questions: 750
      - name: "Business Environment"
        prefix: "BIZ"
        weight: 8.0
        target_questions: 120
